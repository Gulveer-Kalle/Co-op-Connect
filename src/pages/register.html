<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Co-op Connect</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/register.css">
</head>
<body>
  <div class="register-container">
    <!-- Left Side: Logo and Branding -->
    <div class="register-left">
      <div class="logo-section">
        <img src="../assets/images/Logo.png" alt="Logo" class="logo">
      </div>
    </div>

    <!-- Right Side: Register Form -->
    <div class="register-right">
      <div class="register-card">
        <h1>Create Account</h1>
        <p class="form-subtitle">Select your role and create your account</p>

        <!-- Role Selection -->
        <div class="role-selection">
          <button type="button" class="role-btn active" data-role="student" onclick="selectRole('student')">
            Student
          </button>
          <button type="button" class="role-btn" data-role="coordinator" onclick="selectRole('coordinator')">
            Coordinator
          </button>
          <button type="button" class="role-btn" data-role="employer" onclick="selectRole('employer')">
            Employer
          </button>
        </div>

        <form id="registerForm">
          <div class="input-row">
            <div class="input-group">
              <label for="firstName">First Name</label>
              <input type="text" id="firstName" placeholder="John" required>
            </div>

            <div class="input-group">
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName" placeholder="Doe" required>
            </div>
          </div>

          <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>
          </div>

          <div class="input-group password-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
              <input type="password" id="password" placeholder="••••••••" required>
              <button type="button" class="toggle-password" onclick="togglePasswordVisibility('register')">Show</button>
            </div>
          </div>

          <button type="submit" class="register-btn" id="submitBtn">Create Account</button>

          <div id="successMessage" class="success-message" style="display: none;">
            ✓ Account created successfully!
          </div>

          <p class="switch-text">
            Already have an account? <a href="login.html">Sign in here</a>
          </p>
        </form>

        <p class="terms-text">By creating an account, you agree to our Terms of Service and Privacy Policy</p>
      </div>
    </div>
  </div>

  <!-- Firebase SDK via CDN -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
  
  <script src="../assets/js/firebase.js"></script>
  <script src="../assets/js/register.js"></script>
</body>
</html>
